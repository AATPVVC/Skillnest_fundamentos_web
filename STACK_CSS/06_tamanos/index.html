<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamaños en css</title>
    <meta name="author" content="Angel Alvarez">
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="encabezado">
        <h1 class="titulo_header">Tamaño en css</h1>
    </header>
    <main class="container">
        <h2>Ejemplos:</h2>
        <seccion class="row">
            <h3 class="cursiva">Ejemplo 1: Botón</h3>
            <button class="aceptar">Aceptar</button>
            <h3 class="cursiva">Ejemplo 2:</h3>
            <div class="caja1"></div>
            <h3 class="cursiva">Ejemplo3: Parrafo</h3>
            <p class="parrafo1"> Parrafo de ejemplo</p>
            <h3 class="cursiva"> Ejemplo 4: Link</h3>
            <a class="link1" href="#">Click aquí</a>
        </seccion>
        <hr>
        <seccion class="row">
            <h2>Aplicando overflow</h2>
            <div class="caja hidden">
                <p>Ejemplo: hidden</p>
                <div class="example1"></div>
            </div>
            <div class="caja scroll">
                <p>Ejemplo: scroll</p>
                <div class="example2"></div>
            </div>
            <div class="caja auto">
                <p>Ejemplo: auto</p>
                <div class="example3"></div>
            </div>
        </seccion>
        <seccion class="row">
        <h3 class="cursiva"> Ejemplo6: Fondos</h3>
        <div class="banner"></div>
        </seccion>
    </main>
</body>

</html>
