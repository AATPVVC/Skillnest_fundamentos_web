<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>
    <form Action="#" method="post">
        <div>
            <label for="Nombre">Nombre:</label>
            <input type="text" id="Nombre" name="Nombre">
        </div>
        <br>
        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido">
        </div>
        <br>
        <div>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email">
        </div>
        <br>
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password">
        </div>
        <br>
        <label for="confirm_password">Confirmar contraseña:</label>
        <input type="password" id="confirm_password" name="confirm_password">
        <br><br>
        <div>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>
        <br>
        <div>
            <label>Género:</label>
            <input type="radio" id="Masculino" name="Genero" value="Masculino">
            <label for="Masculino">Masculino</label>
            <input type="radio" id="Femenino" name="Genero" value="Femenino">
            <label for="Femenino">Femenino</label>
            <input type="radio" id="Otro" name="Genero" value="Otro">
            <label for="Otro">Otro</label>
        </div>
        <br>
        <label>Descripcion sobre ti:</label><br>
        <textarea name="Descripcion sobre ti" rows="6" cols="30" id="Descripcion"></textarea>
        <br>
        <div>
            <label for="Intereses">Selecciona tus intereses:</label>
            <select id="Intereses" name="Intereses">
                <option value="musica">Música</option>
                <option value="peliculas">Películas</option>
                <option value="deportes">Deportes</option>
                <option value="tecnologia">Tecnología</option>
            </select>
        </div>
        <br>
        <div>
            <input type="checkbox" id="terminos" name="terminos">
            <label for="terminos">Al registrarte aceptas los <a href="https://discord.com/terms">términos y condiciones</a> de Discord</label>
        </div>
        <br>
        <div>
            <input type="submit" id="registrarte" value="Registrase">
        </div>
    </form>
</body>

</html>
